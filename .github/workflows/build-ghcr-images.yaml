name: Build and Push All GHCR Images
on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:
jobs:
  build-and-push-all:
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    env:
      CONTAINER_TOOL: docker
      IMAGE_TAG_BASE: ghcr.io/${{ github.repository }}
      IMG: ghcr.io/${{ github.repository }}:latest
      VERSION: latest
    steps:
      - name: 'Checkout'
        uses: actions/checkout@v4

      - name: 'Login to GitHub Container Registry'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 'Build and Push Operator Image'
        run: |
          make docker-build
          make docker-push

      - name: 'Build and Push Satellite Images'
        working-directory: ptp-tools
        run: |
          make ghcr-buildall CONTAINER_TOOL=docker
          make ghcr-pushall CONTAINER_TOOL=docker

      - name: 'Build and Push Bundle Image'
        run: |
          make bundle
          make bundle-build
          make bundle-push

      - name: 'Build and Push Catalog Image'
        run: |
          make catalog-build
          make catalog-push
